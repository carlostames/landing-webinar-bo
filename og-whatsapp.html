<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1200, initial-scale=1">
  <title>OG WhatsApp - Mapa de generación de demanda</title>
  <style>
    :root {
      --orange: #FE8301;
      --yellow: #FFED02;
      --pink: #ED8BFA;
      --cool: #EBEAE8;
      --ink: #000;
      --paper: #fff;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 1200px;
      height: 630px;
      margin: 0;
      overflow: hidden;
      background: var(--ink);
      color: var(--paper);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .frame {
      position: relative;
      width: 1200px;
      height: 630px;
      padding: 56px 64px;
      overflow: hidden;
      background:
        radial-gradient(ellipse at 80% 20%, rgba(254, 131, 1, 0.32), transparent 44%),
        radial-gradient(ellipse at 76% 78%, rgba(237, 139, 250, 0.24), transparent 38%),
        #000;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 29px;
      letter-spacing: 0.01em;
      position: relative;
      z-index: 4;
    }

    .mark {
      width: 78px;
      height: 38px;
    }

    .eyebrow {
      margin-top: 82px;
      color: var(--orange);
      font-size: 17px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      position: relative;
      z-index: 4;
    }

    h1 {
      width: 650px;
      margin: 28px 0 0;
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 400;
      font-size: 82px;
      line-height: 0.94;
      letter-spacing: 0;
      position: relative;
      z-index: 4;
    }

    h1 em {
      color: var(--orange);
      font-style: italic;
    }

    .sub {
      width: 565px;
      margin-top: 28px;
      color: rgba(255, 255, 255, 0.78);
      font-size: 25px;
      line-height: 1.32;
      position: relative;
      z-index: 4;
    }

    .document {
      position: absolute;
      right: 116px;
      top: 95px;
      width: 330px;
      height: 466px;
      transform: rotate(-4deg);
      border-radius: 8px;
      background: var(--paper);
      color: var(--ink);
      box-shadow: 0 42px 95px rgba(0, 0, 0, 0.58), 0 0 0 1px rgba(255, 255, 255, 0.16);
      overflow: hidden;
      z-index: 3;
    }

    .document::before,
    .document::after {
      content: "";
      position: absolute;
      inset: auto;
      border-radius: 50%;
      filter: blur(0.2px);
    }

    .document::before {
      width: 520px;
      height: 128px;
      left: -62px;
      top: 178px;
      transform: rotate(-12deg);
      background: linear-gradient(95deg, var(--yellow), var(--orange) 52%, var(--pink));
    }

    .document::after {
      width: 190px;
      height: 190px;
      right: -80px;
      bottom: -70px;
      background: var(--cool);
    }

    .doc-inner {
      position: absolute;
      inset: 0;
      padding: 34px 30px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      z-index: 2;
    }

    .doc-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #6b6a68;
    }

    .doc-logo {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 22px;
      letter-spacing: 0;
      color: #000;
    }

    .doc-eyebrow {
      color: var(--orange);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .doc-title {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 46px;
      line-height: 0.94;
      letter-spacing: 0;
      max-width: 260px;
    }

    .doc-title em {
      color: var(--orange);
      font-style: italic;
    }

    .doc-foot {
      display: flex;
      justify-content: space-between;
      padding-top: 14px;
      border-top: 1px solid rgba(0, 0, 0, 0.12);
      color: #777;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.17em;
      text-transform: uppercase;
    }

    .pill {
      position: absolute;
      right: 66px;
      top: 76px;
      padding: 18px 28px;
      border-radius: 999px;
      background: var(--yellow);
      color: var(--ink);
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      transform: rotate(7deg);
      z-index: 5;
      box-shadow: 0 20px 38px rgba(0, 0, 0, 0.38);
    }

    .tag {
      position: absolute;
      right: 398px;
      bottom: 84px;
      padding: 14px 22px;
      border-radius: 999px;
      background: var(--paper);
      color: var(--ink);
      font-size: 14px;
      font-weight: 900;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      transform: rotate(-5deg);
      z-index: 5;
      box-shadow: 0 18px 35px rgba(0, 0, 0, 0.4);
    }

    .footer {
      position: absolute;
      left: 64px;
      bottom: 42px;
      color: rgba(255, 255, 255, 0.45);
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      z-index: 4;
    }
  </style>
</head>
<body>
  <main class="frame">
    <div class="brand">
      <svg class="mark" viewBox="0 0 156 76" aria-hidden="true">
        <path d="M14 42 C44 4, 80 76, 142 22" fill="none" stroke="url(#g)" stroke-width="18" stroke-linecap="round"/>
        <defs>
          <linearGradient id="g" x1="0" x2="1">
            <stop offset="0" stop-color="#FFED02"/>
            <stop offset="0.55" stop-color="#FE8301"/>
            <stop offset="1" stop-color="#ED8BFA"/>
          </linearGradient>
        </defs>
      </svg>
      <span>Black and Orange</span>
    </div>

    <div class="eyebrow">Guía gratuita · Demand Gen</div>
    <h1>El mapa de generación <em>de demanda.</em></h1>
    <p class="sub">Descarga el PDF de 8 páginas para elegir mejor entre paid, owned y earned.</p>

    <section class="document" aria-hidden="true">
      <div class="doc-inner">
        <div class="doc-top">
          <div class="doc-logo">B&amp;O</div>
          <div>2026</div>
        </div>
        <div>
          <div class="doc-eyebrow">Guía práctica</div>
          <div class="doc-title">Mapa de generación <em>de demanda.</em></div>
        </div>
        <div class="doc-foot">
          <span>Black and Orange</span>
          <span>PDF</span>
        </div>
      </div>
    </section>

    <div class="pill">PDF · 8 páginas</div>
    <div class="tag">Canales mapeados</div>
    <div class="footer">Lead magnet · black-n-orange.com</div>
  </main>
</body>
</html>
